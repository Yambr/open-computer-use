name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SANDBOX_IMAGE: ghcr.io/${{ github.repository }}
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server

jobs:
  build-sandbox:
    name: Build Sandbox Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space for 8GB+ image + local load
        run: |
          # Sandbox image is ~8GB; `load: true` stores an extra copy in the
          # docker daemon. Ubuntu runners start with ~14GB free; prune unused
          # preinstalled toolchains to avoid running out during smoke tests.
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          df -h /

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.SANDBOX_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=sha

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pick image tag for smoke tests
        id: img
        run: |
          # docker/metadata-action emits newline-separated tags; grab the first one.
          tag=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Smoke test — image packages and CLI tools
        run: |
          chmod +x tests/test-docker-image.sh
          ./tests/test-docker-image.sh "${{ steps.img.outputs.tag }}"

      - name: Smoke test — Chromium launches in container
        run: |
          docker run --rm --platform linux/amd64 "${{ steps.img.outputs.tag }}" \
            python3 -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('https://example.com', timeout=30000)
              title = page.title()
              browser.close()
              assert 'Example Domain' in title, f'unexpected title: {title}'
              print(f'OK: title={title}')
          "

  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: ./computer-use-server
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-webui:
    name: Build Patched Open WebUI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-webui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: ./openwebui
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run structure and corporate tests
        run: |
          chmod +x tests/test-no-corporate.sh tests/test-project-structure.sh
          ./tests/test-no-corporate.sh
          ./tests/test-project-structure.sh
