<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { rx: 8; stroke-width: 1.5; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .sublabel { font-size: 9px; fill: rgba(255,255,255,0.75); }
      .item { font-size: 10px; fill: #374151; }
      .item-bold { font-size: 10px; font-weight: 600; fill: #1f2937; }
      .arrow { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .arrow-label { font-size: 8.5px; fill: #6b7280; }
    </style>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="750" height="420" rx="10" fill="#fafbfc"/>

  <!-- Settings Wrapper (optional) -->
  <rect x="260" y="15" width="230" height="50" class="box" fill="#8b5cf6" stroke="#7c3aed"/>
  <text x="375" y="37" text-anchor="middle" class="label">Settings Wrapper</text>
  <text x="375" y="52" text-anchor="middle" class="sublabel">Optional · per-user skills + PATs</text>

  <!-- Arrows down -->
  <path d="M320,65 L320,100" class="arrow"/>
  <text x="270" y="87" class="arrow-label">user-config</text>
  <path d="M430,65 L430,100" class="arrow"/>
  <text x="440" y="87" class="arrow-label">skill ZIP</text>

  <!-- Skill Manager -->
  <rect x="200" y="100" width="350" height="55" class="box" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="375" y="122" text-anchor="middle" class="label">skill_manager.py</text>
  <text x="375" y="138" text-anchor="middle" class="sublabel">3-level fallback: memory cache → API → disk cache → defaults</text>

  <!-- Outputs from skill manager -->
  <!-- Left: XML -->
  <path d="M250,155 L250,195" class="arrow"/>
  <rect x="130" y="195" width="240" height="45" class="box" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="250" y="215" text-anchor="middle" class="item-bold">&lt;available_skills&gt; XML</text>
  <text x="250" y="230" text-anchor="middle" class="item">Injected into system prompt</text>

  <!-- Right: Mounts -->
  <path d="M500,155 L500,195" class="arrow"/>
  <rect x="380" y="195" width="240" height="45" class="box" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="500" y="215" text-anchor="middle" class="item-bold">Docker Volume Mounts</text>
  <text x="500" y="230" text-anchor="middle" class="item">/mnt/skills/user/{name} (read-only)</text>

  <!-- Arrow to container -->
  <path d="M250,240 L250,280" class="arrow"/>
  <path d="M500,240 L500,280" class="arrow"/>

  <!-- Container -->
  <rect x="60" y="280" width="630" height="90" class="box" fill="#0f766e" stroke="#0d9488"/>
  <text x="375" y="303" text-anchor="middle" class="label">Sandbox Container</text>

  <rect x="80" y="312" width="180" height="35" rx="5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
  <text x="170" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">/mnt/skills/public/</text>
  <text x="170" y="340" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">13 skills (baked in image)</text>

  <rect x="280" y="312" width="180" height="35" rx="5" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
  <text x="370" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">/mnt/skills/examples/</text>
  <text x="370" y="340" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">14 examples (baked in image)</text>

  <rect x="480" y="312" width="190" height="35" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)"/>
  <text x="575" y="328" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">/mnt/skills/user/</text>
  <text x="575" y="340" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">User skills (bind-mounted)</text>

  <!-- ZIP cache note -->
  <rect x="530" y="100" width="195" height="55" class="box" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="627" y="120" text-anchor="middle" class="item-bold">ZIP Cache</text>
  <text x="627" y="133" text-anchor="middle" class="item">/data/skills-cache/{name}/</text>
  <text x="627" y="146" text-anchor="middle" font-size="8.5" fill="#6b7280">SHA-256 manifest · atomic extract</text>
  <path d="M530,127 L550,127" class="arrow" style="marker-end: none"/>

  <!-- Footer -->
  <text x="375" y="405" text-anchor="middle" font-size="9" fill="#9ca3af">Without Settings Wrapper: all 13 public skills always enabled for everyone (default behavior)</text>
</svg>
